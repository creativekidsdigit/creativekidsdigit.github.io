  </text>

  <!-- Method pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#2E2640">
    <g transform="translate(72 440)">
      <rect width="190" height="44" rx="22" fill="#FFFFFF" stroke="#ECE3F2"/>
      <circle cx="20" cy="22" r="4" fill="#9B7FBF"/>
