    <text x="72" y="36" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#2E2640">
      Fearless <tspan fill="#9B7FBF">Creations</tspan>
    </text>
  </g>

  <!-- Eyebrow chip -->
  <g transform="translate(72 160)">
    <rect x="0" y="0" width="430" height="40" rx="20" fill="#F3ECF8"/>
    <text x="20" y="26" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700"
