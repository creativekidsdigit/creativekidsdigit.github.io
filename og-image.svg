<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBF8F3"/>
      <stop offset="100%" stop-color="#F3ECF8"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9B6E4"/>
      <stop offset="100%" stop-color="#9B7FBF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBF8F3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="100" cy="80" r="120" fill="#EFE3F7" filter="url(#soft)" opacity="0.7"/>
  <circle cx="1140" cy="560" r="160" fill="#FBE8EE" filter="url(#soft)" opacity="0.6"/>
  <circle cx="1040" cy="120" r="80" fill="#FAF1E5" filter="url(#soft)" opacity="0.7"/>

  <!-- Logo + brand -->
  <g transform="translate(72 64)">
    <circle cx="28" cy="28" r="26" fill="#F3ECF8"/>
    <g transform="translate(28 28)">
      <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#petal)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(72)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(144)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(216)"/>
      <ellipse cx="0" cy="-11" rx="5.5" ry="10" fill="url(#petal)" transform="rotate(288)"/>
      <circle r="4" fill="#FBF8F3"/>
