name: Deploy site + app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p _site
          # Copy the existing static site (excludes node_modules, .git, the app source, build artifacts, kiro config)
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.kiro' \
            --exclude='_site' \
            --exclude='app' \
            --exclude='node_modules' \
            ./ _site/
          # Mount the built app at /app/
          mkdir -p _site/app
          cp -R app/dist/. _site/app/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
