<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#9B7FBF" />
  <meta name="robots" content="noindex" />
  <title>Page not found &mdash; Fearless Creations</title>
  <meta name="description" content="The page you were looking for couldn't be found. Browse our lesson plans, printables and teaching resources instead." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="teachers.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23B8A4D4'/><path d='M16 9c2 3 5 4 5 7s-3 5-5 5-5-2-5-5 3-4 5-7z' fill='%23FBF8F3'/></svg>" />
  <style>
    .err-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.25rem;
      background:
        radial-gradient(circle at 20% 20%, var(--lavender-soft), transparent 55%),
        radial-gradient(circle at 80% 80%, var(--blush-soft), transparent 55%),
        var(--cream);
    }
    .err {
      max-width: 640px;
      text-align: center;
    }
    .err .code {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(5rem, 14vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(120deg, var(--purple-deep), var(--purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .err h1 {
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin-bottom: 0.75rem;
    }
    .err p {
      font-size: 1.05rem;
      max-width: 460px;
      margin: 0 auto 2rem;
    }
    .err .err-cta {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .err-mark {
      width: 88px;
      height: 88px;
      margin: 0 auto 1rem;
      display: block;
    }
  </style>
</head>
<body>
  <main class="err-wrap">
    <div class="err">
      <svg class="err-mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="19" fill="#F3ECF8"/>
        <g transform="translate(20 20)">
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#9B7FBF"/>
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#9B7FBF" transform="rotate(72)"/>
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#9B7FBF" transform="rotate(144)"/>
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#9B7FBF" transform="rotate(216)"/>
          <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#9B7FBF" transform="rotate(288)"/>
          <circle r="3" fill="#FBF8F3"/>
        </g>
      </svg>
      <span class="eyebrow">Page not found</span>
      <div class="code" aria-hidden="true">404</div>
      <h1>This lesson seems to have wandered off.</h1>
      <p>The page you were looking for isn&rsquo;t here &mdash; but plenty of ready-to-teach lesson plans are. Head back to the homepage or browse our library.</p>
      <div class="err-cta">
        <a href="/" class="btn btn-primary btn-lg">Back to home</a>
        <a href="/teachers.html" class="btn btn-ghost btn-lg">Browse lesson plans</a>
      </div>
    </div>
  </main>
</body>
</html>
